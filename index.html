<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportBook - Rezervă Terenuri Sportive Online</title>
    <meta name="description" content="Platforma numărul 1 din România pentru rezervarea terenurilor sportive. Tenis, fotbal, padel, înot și multe altele. Rezervă acum!" />
    <meta name="author" content="SportBook" />
    <meta name="keywords" content="rezervare terenuri sportive, tenis, fotbal, padel, înot, sporturi România" />
    
    <!-- DNS prefetch and preconnect for Supabase to reduce API call latency -->
    <link rel="dns-prefetch" href="//ukopxkymzywfpobpcana.supabase.co" />
    <link rel="preconnect" href="https://ukopxkymzywfpobpcana.supabase.co" crossorigin />
    
    <!-- Critical CSS inlined to prevent render-blocking -->
    <style>
      /* Critical base styles for immediate rendering */
      *, ::before, ::after { box-sizing: border-box; border-width: 0; border-style: solid; border-color: #e5e7eb; }
      html { line-height: 1.5; -webkit-text-size-adjust: 100%; -moz-tab-size: 4; tab-size: 4; }
      body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif; }
      
      /* Critical design system variables */
      :root {
        --background: 0 0% 99%;
        --foreground: 210 15% 15%;
        --primary: 210 100% 12%;
        --primary-foreground: 0 0% 98%;
        --card: 0 0% 100%;
        --card-foreground: 210 15% 15%;
        --border: 210 15% 90%;
      }
      
      body { background-color: hsl(var(--background)); color: hsl(var(--foreground)); }
      #root { min-height: 100vh; }
      
      /* Critical loading state */
      .loading-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      .loading-spinner { width: 32px; height: 32px; border: 2px solid hsl(var(--border)); border-top: 2px solid hsl(var(--primary)); border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
    
    <!-- Preload and async load main CSS to prevent render-blocking -->
    <link rel="preload" as="style" href="/src/index.css" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="/src/index.css"></noscript>
    
    <!-- Preload critical hero image for better LCP -->
    <link rel="preload" as="image" href="/src/assets/hero-sports.jpg" fetchpriority="high" />

    <meta property="og:title" content="SportBook - Rezervă Terenuri Sportive Online" />
    <meta property="og:description" content="Găsește și rezervă cele mai bune facilități sportive din România. Tenis, fotbal, padel, înot și multe altele." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <!-- Critical loading fallback if CSS hasn't loaded yet -->
      <div class="loading-container">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Fallback CSS loading script -->
    <script>
      // Ensure CSS loads even if preload fails
      (function() {
        var cssLoaded = false;
        var link = document.querySelector('link[href="/src/index.css"]');
        if (!link) {
          link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = '/src/index.css';
          document.head.appendChild(link);
        }
        
        // Remove loading fallback once CSS is loaded
        link.onload = function() {
          if (!cssLoaded) {
            cssLoaded = true;
            var loadingEl = document.querySelector('.loading-container');
            if (loadingEl) loadingEl.style.display = 'none';
          }
        };
        
        // Timeout fallback to remove loading state
        setTimeout(function() {
          var loadingEl = document.querySelector('.loading-container');
          if (loadingEl) loadingEl.style.display = 'none';
        }, 2000);
      })();
    </script>
  </body>
</html>
