<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportBook - Rezervă Terenuri Sportive Online</title>
    <meta name="description" content="Platforma numărul 1 din România pentru rezervarea terenurilor sportive. Tenis, fotbal, padel, înot și multe altele. Rezervă acum!" />
    <meta name="author" content="SportBook" />
    <meta name="keywords" content="rezervare terenuri sportive, tenis, fotbal, padel, înot, sporturi România" />
    
    <!-- Critical request chain optimization -->
    <!-- Preconnect for Supabase API calls - with specific subdomain and proper attributes -->
    <link rel="preconnect" href="https://ukopxkymzywfpobpcana.supabase.co" crossorigin="anonymous" />
    <link rel="dns-prefetch" href="//ukopxkymzywfpobpcana.supabase.co" />
    
    <!-- Preconnect to auth subdomain for faster authentication -->
    <link rel="preconnect" href="https://ukopxkymzywfpobpcana.supabase.co/auth" crossorigin="anonymous" />
    <link rel="preconnect" href="https://ukopxkymzywfpobpcana.supabase.co/rest" crossorigin="anonymous" />
    <link rel="preconnect" href="https://ukopxkymzywfpobpcana.supabase.co/storage" crossorigin="anonymous" />
    
    <!-- Critical resource preloads to reduce dependency chain length -->
    <link rel="modulepreload" href="/src/main.tsx" />
    <link rel="modulepreload" href="/src/integrations/supabase/client.ts" />
    <link rel="modulepreload" href="/src/components/HeroSection.tsx" />
    <link rel="modulepreload" href="/src/components/SportsSection.tsx" />
    
    <!-- Critical CSS inlined to prevent render-blocking -->
    <style>
      /* Critical base styles for immediate rendering */
      *, ::before, ::after { box-sizing: border-box; border-width: 0; border-style: solid; border-color: #e5e7eb; }
      html { line-height: 1.5; -webkit-text-size-adjust: 100%; -moz-tab-size: 4; tab-size: 4; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif; }
      body { margin: 0; background-color: hsl(0 0% 99%); color: hsl(210 15% 15%); }
      
      /* Critical design system variables - only essential ones */
      :root {
        --background: 0 0% 99%;
        --foreground: 210 15% 15%;
        --primary: 210 100% 12%;
        --primary-foreground: 0 0% 98%;
        --card: 0 0% 100%;
        --card-foreground: 210 15% 15%;
        --border: 210 15% 90%;
        --muted: 210 15% 97%;
        --muted-foreground: 210 10% 45%;
        --secondary: 210 15% 96%;
        --secondary-foreground: 210 15% 15%;
        --gradient-hero: linear-gradient(135deg, hsl(210 100% 12%), hsl(210 60% 25%));
        --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      /* Critical layout utilities */
      .min-h-screen { min-height: 100vh; }
      .container { width: 100%; margin-left: auto; margin-right: auto; padding-left: 1rem; padding-right: 1rem; }
      @media (min-width: 640px) { .container { max-width: 640px; } }
      @media (min-width: 768px) { .container { max-width: 768px; } }
      @media (min-width: 1024px) { .container { max-width: 1024px; } }
      @media (min-width: 1280px) { .container { max-width: 1280px; } }
      
      /* Critical loading state */
      .loading-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
      .loading-spinner { width: 32px; height: 32px; border: 2px solid hsl(210 15% 90%); border-top: 2px solid hsl(210 100% 12%); border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      /* Critical typography */
      .text-4xl { font-size: 2.25rem; line-height: 2.5rem; }
      .text-xl { font-size: 1.25rem; line-height: 1.75rem; }
      .font-bold { font-weight: 700; }
      .text-center { text-align: center; }
      .mb-4 { margin-bottom: 1rem; }
      .py-8 { padding-top: 2rem; padding-bottom: 2rem; }
      .px-4 { padding-left: 1rem; padding-right: 1rem; }
    </style>
    
    <!-- Load main CSS non-blocking using media attribute technique -->
    <link rel="stylesheet" href="/src/index.css" media="print" onload="this.media='all'; this.onload=null;" />
    <noscript><link rel="stylesheet" href="/src/index.css"></noscript>
    
    <!-- Preload critical hero image for better LCP -->
    <link rel="preload" as="image" href="/src/assets/hero-sports.jpg" fetchpriority="high" />
    
    <!-- Resource hints for critical third-party connections -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Module preload for critical JavaScript chunks moved earlier for better optimization -->
    <!-- These were moved to the critical section above -->
    
    <!-- Modern image format hints for better optimization -->
    <meta name="imageFormat" content="webp,avif,jpeg" />

    <meta property="og:title" content="SportBook - Rezervă Terenuri Sportive Online" />
    <meta property="og:description" content="Găsește și rezervă cele mai bune facilități sportive din România. Tenis, fotbal, padel, înot și multe altele." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root">
      <!-- Critical loading fallback if CSS hasn't loaded yet -->
      <div class="loading-container">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx" defer></script>
    
    <!-- Register service worker for efficient caching -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    
    <!-- Simplified CSS loading check -->
    <script>
      // Remove loading fallback once app mounts
      document.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var loadingEl = document.querySelector('.loading-container');
          if (loadingEl) loadingEl.style.display = 'none';
        }, 100);
      });
    </script>
  </body>
</html>
